<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lessons to My Son</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <h1>Lessons to My Son</h1>
  <p>A personal, curated archive of letters written over time.</p>

  <ul id="posts">
    <li>Loading…</li>
  </ul>

  <script>
    async function loadPosts() {
      const ul = document.getElementById("posts");

      try {
        // posts.json is generated by GitHub Actions on every push to /posts
        const res = await fetch("posts.json", { cache: "no-store" });
        if (!res.ok) throw new Error("Failed to fetch posts.json");

        const posts = await res.json(); // [{ href, title, date }]

        if (!Array.isArray(posts) || posts.length === 0) {
          ul.innerHTML = "<li>No posts yet.</li>";
          return;
        }

        ul.innerHTML = posts.map(p => `
          <li>
            <a href="${p.href}">${escapeHtml(p.title || "Untitled")}</a><br>
            <span>${escapeHtml(p.date || "")}</span>
          </li>
        `).join("");
      } catch (err) {
        ul.innerHTML = `<li>Could not load posts list.</li>`;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadPosts();
  </script>
</body>
</html>
